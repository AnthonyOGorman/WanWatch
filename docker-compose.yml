services:
  web:
    build: .
    ports:
      - "3000:3000"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    command: sh -lc "pnpm prisma:deploy && pnpm start"

  worker:
    build: .
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    command: sh -lc "pnpm prisma:deploy && pnpm worker:dev"
    depends_on:
      - web
