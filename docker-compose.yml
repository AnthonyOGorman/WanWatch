services:
  web:
    image: aogorman/wanwatch:latest
    ports:
      - "3000:3000"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    command: sh -lc "pnpm prisma:deploy && pnpm start"
    restart: unless-stopped

  worker:
    image: aogorman/wanwatch:latest
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    command: sh -lc "pnpm prisma:deploy && pnpm worker:dev"
    depends_on:
      - web
    restart: unless-stopped
